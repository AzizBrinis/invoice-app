name: Messaging Local Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: messaging-local-sync
  cancel-in-progress: false

jobs:
  ping-cron-endpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Call messaging local-sync cron endpoint
        env:
          CRON_ENDPOINT: ${{ secrets.CRON_ENDPOINT }}
          CRON_SECRET_TOKEN: ${{ secrets.CRON_SECRET_TOKEN }}
        run: |
          set -euo pipefail

          CRON_ENDPOINT="${CRON_ENDPOINT//$'\r'/}"
          CRON_SECRET_TOKEN="${CRON_SECRET_TOKEN//$'\r'/}"

          if [ -z "$CRON_ENDPOINT" ]; then
            echo "CRON_ENDPOINT secret is not set" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET_TOKEN" ]; then
            echo "CRON_SECRET_TOKEN secret is not set" >&2
            exit 1
          fi
          display_endpoint="${CRON_ENDPOINT%%\?*}"
          separator="?"
          case "$CRON_ENDPOINT" in
            *\?*) separator="&" ;;
          esac
          request_url="${CRON_ENDPOINT}${separator}scope=local-sync"

          echo "Triggering messaging local sync at ${display_endpoint}"

          response_file="$(mktemp)"
          http_status=""
          if ! http_status="$(curl --silent --show-error --location --max-redirs 3 \
            --connect-timeout 15 \
            --max-time 240 \
            --write-out "%{http_code}" \
            --output "$response_file" \
            -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $CRON_SECRET_TOKEN" \
            "$request_url")"; then
            echo "Cron endpoint request failed to execute." >&2
            cat "$response_file" >&2 || true
            exit 1
          fi

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Cron endpoint returned HTTP ${http_status}" >&2
            cat "$response_file" >&2 || true
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            jq '.' "$response_file" || cat "$response_file"
            queue_failed="$(jq -r '.queue.failed // 0' "$response_file" 2>/dev/null || echo 0)"
            queue_retried="$(jq -r '.queue.retried // 0' "$response_file" 2>/dev/null || echo 0)"
            if [ "$queue_retried" -gt 0 ]; then
              echo "Messaging local sync reported ${queue_retried} retried job(s)." >&2
            fi
            if [ "$queue_failed" -gt 0 ]; then
              echo "Messaging local sync reported ${queue_failed} failed job(s)." >&2
              exit 1
            fi
          else
            cat "$response_file"
          fi
